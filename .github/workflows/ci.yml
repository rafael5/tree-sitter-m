name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  grammar:
    name: grammar (corpus + lib)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: tree-sitter test (110 corpus tests)
        run: npx tree-sitter test
      - name: lib tests (stamp.js metadata join)
        run: npm run test:lib
      - name: per-tier coverage gate (every keyword has a corpus test)
        run: npm run test:coverage
      - name: regenerate parser and verify committed src/parser.c is in sync
        run: |
          npx tree-sitter generate
          if ! git diff --exit-code -- src/parser.c src/grammar.json src/node-types.json; then
            echo "::error::Generated parser artifacts diverge from grammar.js."
            echo "::error::Run 'npx tree-sitter generate' locally and commit the result."
            exit 1
          fi

  node:
    name: node (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest and windows-latest temporarily dropped 2026-05-09
        # — pre-existing failures (Windows wheel build needs MSVC + Python.h
        # on the runner; macOS untriaged). Restore once the platform-
        # specific issues are addressed. See m-dev-tools-todo.md Part A.
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run test:binding

  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest and windows-latest temporarily dropped 2026-05-09
        # — pre-existing failures (Windows wheel build needs MSVC + Python.h
        # on the runner; macOS untriaged). Restore once the platform-
        # specific issues are addressed. See m-dev-tools-todo.md Part A.
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release

  go:
    name: go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest and windows-latest temporarily dropped 2026-05-09
        # — pre-existing failures (Windows wheel build needs MSVC + Python.h
        # on the runner; macOS untriaged). Restore once the platform-
        # specific issues are addressed. See m-dev-tools-todo.md Part A.
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go test ./bindings/go/...

  python:
    name: python (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest and windows-latest temporarily dropped 2026-05-09
        # — pre-existing failures (Windows wheel build needs MSVC + Python.h
        # on the runner; macOS untriaged). Restore once the platform-
        # specific issues are addressed. See m-dev-tools-todo.md Part A.
        os: [ubuntu-latest]
        python: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install --upgrade pip && pip install "tree-sitter>=0.24" .
      - run: python -m unittest discover -s bindings/python/tests
