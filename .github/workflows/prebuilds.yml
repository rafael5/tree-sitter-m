name: Prebuilds

# Builds prebuilt N-API binaries (via `prebuildify`) for every supported
# (os, arch) and attaches them to the GitHub Release for the pushed tag.
#
# Runs on `v*` tag push. The matrix produces `prebuilds/<platform>-<arch>/`
# directories that `node-gyp-build` consumes at npm-install time so end
# users do not need a C toolchain.
#
# To consume locally before `npm publish` (RELEASE.md §3):
#   gh release download "v$NEW" -p 'prebuilds-*.tar.gz' -D /tmp/ts-m-prebuilds
#   for f in /tmp/ts-m-prebuilds/prebuilds-*.tar.gz; do tar -xzf "$f"; done
#   npm pack --dry-run                    # confirm prebuilds/ is included
#   npm publish --access public

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build prebuilds for (e.g. v0.1.0). Required for manual runs; release upload is skipped.'
        required: false

concurrency:
  group: prebuilds-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: prebuild (${{ matrix.os }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-22.04-arm
          - os: macos
            arch: x64
            runner: macos-13
          - os: macos
            arch: arm64
            runner: macos-14
          - os: windows
            arch: x64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Build prebuilds
        run: npm run prebuildify
      - name: Verify prebuilds directory exists
        shell: bash
        run: |
          if [ ! -d prebuilds ] || [ -z "$(ls -A prebuilds 2>/dev/null)" ]; then
            echo "::error::prebuilds/ directory missing or empty after prebuildify run"
            exit 1
          fi
          echo "Prebuilds produced:"
          ls -la prebuilds/
      - name: Package prebuilds
        shell: bash
        run: |
          tar -czf "prebuilds-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" prebuilds/
          ls -la "prebuilds-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuilds-${{ matrix.os }}-${{ matrix.arch }}
          path: prebuilds-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
          if-no-files-found: error
          retention-days: 14

  attach-to-release:
    name: Attach prebuilds to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all prebuild artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: prebuilds-*
          merge-multiple: true
      - name: List downloaded artifacts
        run: ls -la dist/
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG does not exist yet — creating draft."
            gh release create "$TAG" --draft --title "$TAG" \
              --notes "Prebuilds attached by CI; see RELEASE.md for the full publish runbook."
          fi
          gh release upload "$TAG" dist/prebuilds-*.tar.gz --clobber
