[package]
name = "tree-sitter-m"
description = "Tree-sitter grammar for the M (MUMPS) programming language. Generated from m-standard's grammar-surface.json (union of AnnoStd, YottaDB, IRIS)."
version = "0.1.1"
authors = ["Rafael Richards"]
license = "AGPL-3.0"
readme = "README.md"
keywords = ["incremental", "parsing", "tree-sitter", "m"]
categories = ["parser-implementations", "parsing", "text-editors"]
repository = "https://github.com/m-dev-tools/tree-sitter-m"
edition = "2021"
autoexamples = false

build = "bindings/rust/build.rs"
include = [
  "bindings/rust/*",
  "grammar.js",
  "queries/*",
  "src/*",
  "tree-sitter.json",
  "/LICENSE",
]

[lib]
path = "bindings/rust/lib.rs"

[dependencies]
tree-sitter-language = "0.1"

[build-dependencies]
cc = "1.2"

[dev-dependencies]
tree-sitter = "0.25.10"
